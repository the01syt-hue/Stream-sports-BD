<div class="section-title">Current Match Schedule</div>
<div class="grid-box" id="live-schedule-grid">
  <div class="loading-msg">🔄 Scanning...</div>
</div>

<script>
  (async function() {
    const grid = document.getElementById("live-schedule-grid");
    // Change these names to match EXACTLY what you named your files in the /pages folder
    const filesToFind = ["m1.html", "match-1.html"]; 
    
    let found = false;
    for (const fileName of filesToFind) {
      try {
        const res = await fetch(`pages/${fileName}`);
        if (res.ok) {
          const text = await res.text();
          if (text.includes("serverFeeds")) {
            // If it finds the file and the data, it triggers the card
            found = true;
            // ... (Your card generation code here)
          }
        }
      } catch (e) { console.error("Error fetching", fileName); }
    }
    if (!found) grid.innerHTML = "No matches found. Check if pages/m1.html exists.";
  })();
</script>
