<div class="section-title">Current Match Schedule</div>
<div class="grid-box" id="live-schedule-grid"></div>

<script>
  const matches = [
    { 
      name: "Qatar vs Switzerland", 
      streams: [
        {name: "Main Server", url: "https://embed.st/embed/admin/ppv-qatar-vs-switzerland/1"},
        {name: "Backup 1", url: "https://embed.st/embed/admin/ppv-qatar-vs-switzerland/3"}
      ]
    }
  ];

  const grid = document.getElementById("live-schedule-grid");
  matches.forEach(match => {
    const card = document.createElement("div");
    card.className = "fixture-card";
    card.innerHTML = `<div class="match-title-text">${match.name}</div><button class="btn-watch">Watch Now</button>`;
    card.onclick = () => navigateTo("player.html", match);
    grid.appendChild(card);
  });
</script>
