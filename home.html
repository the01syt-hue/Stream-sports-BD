<div class="section-title">Current Match Schedule</div>
<div class="grid-box" id="live-schedule-grid">
  <div class="loading-msg">🔄 Sweeping local data paths...</div>
</div>

<script>
  (async function runLocalSlotScanner() {
    const grid = document.getElementById("live-schedule-grid");
    grid.innerHTML = "";
    let matchesShowing = false;

    // The optimized core scanning list queue matrix
    const scanQueue = ["m1.html", "m2.html", "m3.html"];
    
    // Generates search routes from match-1.html up to match-10.html completely automatically
    for (let i = 1; i <= 10; i++) {
      scanQueue.push(`match-${i}.html`);
    }

    for (const fileName of scanQueue) {
      const filePath = `pages/${fileName}`;

      try {
        const res = await fetch(filePath);
        if (res.ok) {
          const htmlText = await res.text();
          
          const titleMatch = htmlText.match(/<title>(.*?)<\/title>/);
          const tagMatch = htmlText.match(/data-tag="(.*?)"/);
          const payloadMatch = htmlText.match(/serverFeeds = (.*?);/);

          if (titleMatch && payloadMatch) {
            const title = titleMatch[1].replace(" - Stream Sports BD", "");
            const tag = tagMatch ? tagMatch[1] : "LIVE";
            const streamsArray = JSON.parse(payloadMatch[1]);

            matchesShowing = true;

            const card = document.createElement("div");
            card.className = "fixture-card";
            
            // Forward channel structural array data directly into your core active router engine
            card.onclick = () => navigateTo("player.html", { name: title, streams: streamsArray });
            
            card.innerHTML = `
              <div class="card-inner-flex">
                <div>
                  <span class="status-badge-pill">${tag}</span>
                  <div class="match-title-text">${title}</div>
                </div>
                <button class="btn-watch">Watch</button>
              </div>
            `;
            grid.appendChild(card);
          }
        }
      } catch (e) {
        // Skips unassigned paths quietly
      }
    }

    if (!matchesShowing) {
      grid.innerHTML = '<div class="loading-msg">[SYS_STATUS: NO_ACTIVE_BROADCAST_FEEDS]</div>';
    }
  })();
</script>
