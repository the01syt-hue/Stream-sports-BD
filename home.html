<div class="section-title">Upcoming Live Matches</div>
<div class="grid-box" id="grid">
  <div class="loading-msg">🔄 Syncing with Database...</div>
</div>

<script>
  (async function() {
    const GIST_URL = "https://gist.githubusercontent.com/the01syt-hue/4b8665d8cc6ecc2f5deff8c5886fa470/raw/5b0e7660a88b0a68250129d318373bc93c3ae08e/gistfile1.json";
    const grid = document.getElementById("grid");

    try {
      const res = await fetch(GIST_URL);
      const matches = await res.json();
      grid.innerHTML = ""; 

      matches.forEach(m => {
        const card = document.createElement("div");
        card.className = "fixture-card";
        card.innerHTML = `<div class="match-title-text">${m.name}</div><button class="btn-watch">Watch Now</button>`;
        card.onclick = () => navigateTo("player.html", m);
        grid.appendChild(card);
      });
    } catch (e) {
      grid.innerHTML = "<div class='loading-msg'>❌ Unable to sync schedule.</div>";
    }
  })();
</script>
