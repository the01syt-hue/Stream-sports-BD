<button class="back-nav" onclick="navigateTo('home.html')">⬅️ Back</button>
<div class="screen-box"><iframe id="stream-screen" allowfullscreen="yes"></iframe></div>
<div class="control-strip" id="feeds-wrapper"></div>
<h2 id="stream-title"></h2>

<script>
  (function() {
    const data = window.currentRouteParams;
    if (!data) { navigateTo("home.html"); return; }

    document.getElementById("stream-title").innerText = data.name;
    const player = document.getElementById("stream-screen");
    const wrapper = document.getElementById("feeds-wrapper");

    player.src = data.streams[0].url;

    data.streams.forEach((feed, index) => {
      const btn = document.createElement("button");
      btn.className = `srv-tab ${index === 0 ? 'active' : ''}`;
      btn.innerText = feed.name;
      btn.onclick = () => {
        player.src = feed.url;
        document.querySelectorAll('.srv-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      };
      wrapper.appendChild(btn);
    });
  })();
</script>
