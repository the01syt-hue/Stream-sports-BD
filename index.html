<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream Sports BD - Premium Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrapper">
    <div class="header-container">
      <h1>🇧🇩 Stream Sports BD</h1>
    </div>
    <div id="app-viewport"></div>
  </div>

  <script>
    window.currentRouteParams = null;
    async function navigateTo(targetPage, parameters = null) {
      window.currentRouteParams = parameters;
      const viewport = document.getElementById("app-viewport");
      const res = await fetch(targetPage);
      if (res.ok) {
        viewport.innerHTML = await res.text();
        const scripts = viewport.querySelectorAll("script");
        scripts.forEach(oldScript => {
          const newScript = document.createElement("script");
          newScript.textContent = oldScript.textContent;
          document.body.appendChild(newScript);
        });
      }
    }
    navigateTo("home.html");
  </script>
</body>
</html>
